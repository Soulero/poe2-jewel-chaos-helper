name: windows-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.1.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-zip:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Resolve version
        id: vars
        shell: pwsh
        run: |
          $manual = "${{ inputs.version }}"
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } elseif ($manual -and $manual.Trim().Length -gt 0) {
            $version = $manual.Trim().TrimStart("v")
          } else {
            $version = "build-${{ github.run_number }}"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package Windows release zip
        run: |
          python scripts/package_windows_release.py --version "${{ steps.vars.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.vars.outputs.version }}
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
